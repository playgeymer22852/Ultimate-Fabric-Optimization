name: "⚙️ Изменение настроек / Setting change"
description: "Предложить изменить стандартные настройки, конфиги или горячие клавиши в сборке."
labels: ["option"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔧 Запрос на изменение конфигурации сборки
        Перед тем как предложить изменить какую-либо настройку по умолчанию, пожалуйста, [убедитесь через поиск](https://github.com), что аналогичное предложение не обсуждалось ранее. 
        Убедитесь, что вы используете самую последнюю версию нашего модпака.

  - type: textarea
    id: what_to_change
    attributes:
      label: "🔧 Какую настройку вы предлагаете изменить?"
      description: "Подробно опишите, какой параметр, клавишу или конфигурационный файл какого мода стоит скорректировать."
      placeholder: "Например: Изменить стандартную клавишу Zoomify (Приближение) с 'V' на 'C'..."
    validations:
      required: true

  - type: textarea
    id: why_change
    attributes:
      label: "❓ Почему это нужно изменить?"
      description: "Какую конкретную пользу это принесет всем игрокам, сохраняя при этом классический ванильный баланс игры?"
      placeholder: "Например: Клавиша 'V' часто конфликтует со стандартным голосовым чатом на многих популярных серверах..."
    validations:
      required: true
    
  - type: textarea
    id: additional
    attributes:
      label: "📌 Дополнительные детали"
      description: "Всё, что вы хотите добавить от себя (необязательно)."
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: "🛡️ Подтверждение соглашения"
      options:
        - label: "Это запрос строго на изменение стандартной конфигурации модпака (ванильных параметров или файлов модов). Это не запрос на добавление совершенно новых функций или модов, которых сейчас нет в сборке."
          required: true
