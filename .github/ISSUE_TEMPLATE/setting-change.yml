name: "⚙️ Изменение настроек / Setting change"
description: "Предложите изменить конфиг, горячие клавиши или дефолтные настройки модов для лучшего FPS"
title: "[Setting Change]: "
labels: ["config"]
body:
  - type: markdown
    attributes:
      value: |
        ### ⚙️ Изменение конфигурации Ultimate Optimization / Config changes
  - type: textarea
    id: change_info
    attributes:
      label: "1. Какие настройки нужно изменить по умолчанию и почему? / Details"
      placeholder: "Отключите мягкое освещение в Sodium по умолчанию, так как это дает +15 FPS на старых видеокартах..."
    validations:
      required: true
  - type: input
    id: pc_impact
    attributes:
      label: "2. На каком железе и разрешении экрана это проверялось? / PC Specs & Resolution used for testing"
      placeholder: "e.g. Ноутбук AMD Ryzen 3, разрешение экрана 1920x1080..."
    validations:
      required: true
  - type: dropdown
    id: config_os
    attributes:
      label: "3. На какой операционной системе проверялись новые настройки? / Operating System used"
      options:
        - "🪟 Windows 10 / 11"
        - "🐧 Linux"
        - "🍏 MacOS"
        - "📱 PojavLauncher"
    validations:
      required: true
  - type: checkboxes
    id: user_agreement_config
    attributes:
      label: "⚖️ Пользовательское соглашение / User Agreement"
      options:
        - label: "Я гарантирую, что предложенное изменение настроек действительно повышает общую производительность (FPS) или исправляет конфликты управления, и я тестировал это лично на официальной сборке / I agree to the terms"
          required: true
