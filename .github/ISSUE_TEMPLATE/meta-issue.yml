name: "📁 Техническая задача / Meta issue"
description: "Используйте этот тип задач только по прямой просьбе создателя сборки"
title: "[Meta]: "
labels: ["meta"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📁 Внутренняя техническая задача проекта Ultimate Optimization
  - type: textarea
    id: meta_info
    attributes:
      label: "Технические подробности задачи / Details"
      placeholder: "Перевод сборки на новую версию Minecraft 1.21.x и глобальное тестирование стабильности FPS..."
    validations:
      required: true
