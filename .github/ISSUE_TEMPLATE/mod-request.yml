
name: "🧩 Запрос нового мода / Mod request"
description: "Предложить новый оптимизационный мод для добавления в сборку."
title: "[Mod Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Предложите крутую модификацию!
        Перед отправкой запроса, пожалуйста, убедитесь, что этот мод ещё не добавлен в нашу сборку Ultimate Fabric Optimization. 
        Помните главное правило: чем меньше лишних модов, тем лучше общая производительность игры.

  - type: input
    id: mod_name
    attributes:
      label: "🔗 Название мода / Mod Name"
      description: "Введите официальное название модификации."
      placeholder: "Например: Bobby, Iris, Sodium..."
    validations:
      required: true

  - type: input
    id: modrinth_link
    attributes:
      label: "🟢 Ссылка на Modrinth"
      description: "Укажите прямую ссылку на страницу модификации на Modrinth."
      placeholder: "https://modrinth.com..."
    validations:
      required: true

  - type: input
    id: source_link
    attributes:
      label: "💻 Ссылка на исходный код (GitHub)"
      description: "Укажите ссылку на официальный репозиторий проекта на GitHub (если есть)."
      placeholder: "https://github.com..."
    validations:
      required: false

  - type: input
    id: file_size
    attributes:
      label: "⚖️ Размер файла мода"
      description: "Укажите примерный вес `.jar` файла с сайта Modrinth (например: 150 КБ, 2 МБ). Напишите 'неизвестно', если версий еще нет."
      placeholder: "Например: 240 KB"
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: "📜 Лицензия мода"
      description: "Какая лицензия указана в боковом меню страницы Modrinth?"
      options:
        - "Открытая (MIT / Apache / GPL / BSD)"
        - "Все права защищены (All Rights Reserved / ARR)"
        - "Кастомная лицензия (Custom)"
        - "Неизвестно"
    validations:
      required: true

  - type: textarea
    id: what_it_does
    attributes:
      label: "❓ Что делает этот мод? / What it does"
      description: "Дайте краткое описание основных функций модификации."
      placeholder: "Например: Этот мод оптимизирует рендеринг шрифтов и текста в меню..."
    validations:
      required: true

  - type: textarea
    id: why_in_pack
    attributes:
      label: "➕ Почему он ДОЛЖЕН быть в сборке?"
      description: "Какую конкретную пользу он принесет игрокам, сохраняя при этом ванильную атмосферу?"
      placeholder: "Например: Он полностью убирает микролаги при открытии больших сундуков с предметами..."
    validations:
      required: true

  - type: textarea
    id: why_not_in_pack
    attributes:
      label: "➖ Почему он НЕ ДОЛЖЕН быть в сборке? (Минусы)"
      description: "У каждого мода есть недостатки. Опишите возможные минусы (баги, долгая загрузка, конфликты)."
      placeholder: "Например: Мод может незначительно конфликтовать со старыми кастомными ресурс-паками..."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: "📌 Дополнительные детали"
      description: "Всё, что вы хотите добавить от себя (необязательно)."
    validations:
      required: false
